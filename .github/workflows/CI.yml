name: CI

on:
  push:
    # branches to consider in the event; optional, defaults to all
    branches:
      - master
  # pull_request event is required only for autolabeler
  pull_request:
    # Only following types are handled by the action, but one can default to all as well
    types: [opened, reopened, synchronize]
  # pull_request_target event is required for autolabeler to support PRs from forks
  # pull_request_target:
  #   types: [opened, reopened, synchronize]

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v1
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '11'
      - name: Build with Maven
        run:
          mvn clean package
      - name: Create release
        id: cr
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        with:
          tag_name: beta-0.${{github.run_number}}
          release_name: beta-0.${{github.run_number}}
      - name: Upload main file to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        with:
          upload_url: ${{steps.cr.outputs.upload_url}}
          asset_path: ./target/mybot-jar-with-dependencies.jar
          asset_name: mybot-alpha0.0.${{github.run_number}}.jar
          asset_content_type: application/jar
      - name: Upload javadoc file to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        with:
          upload_url: ${{steps.cr.outputs.upload_url}}
          asset_path: ./target/mybot-javadoc.jar
          asset_name: mybot-alpha0.0.${{github.run_number}}-javadoc.jar
          asset_content_type: application/jar
      - name: Upload source file to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
        with:
          upload_url: ${{steps.cr.outputs.upload_url}}
          asset_path: ./target/mybot-sources.jar
          asset_name: mybot-alpha0.0.${{github.run_number}}-sources.jar
          asset_content_type: application/jar